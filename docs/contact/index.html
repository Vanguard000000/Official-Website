<header class="subpage-hero">
    <a href="../" class="back-link">&larr; Back to home</a>
    <h1>Contact Me</h1>
    <p>Have a question, idea, or just want to connect? Drop me a message.</p>
</header>

<main class="subpage-body">
    <section>
        <form class="contact-form" action="https://formspree.io/f/mdavzvgn" method="POST">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="your.email@example.com">
            </div>
            <div class="form-group">
                <label for="reason">Reason for Contacting</label>
                <textarea id="reason" name="reason" rows="5" required placeholder="Tell me what's on your mind..."></textarea>
            </div>
            <button type="submit" class="cta-button">Send Message</button>
        </form>
    </section>
</main>
